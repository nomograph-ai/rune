include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - component: gitlab.com/nomograph/pipeline/rust-cli@v2.4.6
    inputs:
      binary_name: rune
      project_description: "Skill registry manager for AI coding agents."
      audit_allow_failure: false
      crates_publish: true

stages: [test, build, sign, publish, release, notify]

file-size-gate:
  stage: test
  tags: [storr]
  needs: []
  script:
    - ./scripts/check-file-sizes.sh

shellcheck:
  stage: test
  tags: [storr]
  image: koalaman/shellcheck-alpine:stable
  needs: []
  script:
    - shellcheck -s bash resources/hook.sh
    - shellcheck -s sh scripts/check-file-sizes.sh

# Nudge the kits registry to re-sense on tag push (kit-registry@v3.1.0+).
notify-kits:
  stage: notify
  rules:
    - if: $CI_COMMIT_TAG
  trigger:
    project: nomograph/kits
    branch: main
  # fire-and-forget; kits has its own lifecycle

default:
  tags: [storr]
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
