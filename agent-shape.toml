# agent-shape.toml for rune
#
# Run with: `jig run agent-shape.toml --tuning-only`
# Validate rubric vs binary: `jig check agent-shape.toml --binary $(which rune)`
#
# Drives jig's runtime-in-the-loop battery to measure whether rune's
# CLI is shaped so agents reach for correct commands by default.
# Third subject tool for jig.

[subject]
name = "rune"
binary = "rune"
description = "Registry manager for AI coding agent skills, agents, and rules. Syncs markdown files from git-based registries into .claude/skills/, .claude/agents/, .claude/rules/. Tracks drift via content-hash lockfile and pedigree frontmatter."

[fixture]
# Idempotent script: seeds an isolated $HOME with a rune config and three
# local git registries (one writable: labs-runes, two readonly:
# upstream-mirror, anthropic-mirror), plus a project with synced skills,
# an agent, a rule, a deliberately DRIFTED skill, a manifest entry
# pointing at an unconfigured registry, and an imported skill whose
# upstream has advanced.
setup = "scripts/agent-shape-fixture.sh"
workdir = "fixtures/agent-shape-realistic/project"

[run]
n = 10
models = ["claude-opus-4-7", "claude-sonnet-4-6"]
turn_cap = 3
timeout_seconds = 180

[judge]
model = "claude-haiku-4-5"
double_score = true
required_fields = [
  "score",
  "first_command",
  "first_command_existed",
  "completed",
  "invented_commands",
  "fallback_to_sql",
  "reasoning",
]
rubric = """
You are judging whether an agent completed a CLI task against the
`rune` tool. rune syncs markdown files (skills / agents / rules) from
git-based registries into a project's .claude/ directory. It tracks
drift via a content-hash lockfile and surfaces upstream updates.

Score on a 4-point rubric:
  1.00  completed correctly, first command attempt was real and worked
  0.50  completed correctly, but reached for non-existent rune commands first
  0.25  completed via raw filesystem operations bypassing rune
  0.00  did not complete

Commands that exist in rune include (non-exhaustive):
  rune setup | init | sync | check | status | doctor | clean | audit
  rune add <item> [--from <registry>|--registry <registry>] [-t skill|agent|rule]
  rune remove <item>
  rune push <item>
  rune ls [--registry <name>]
  rune registry list                # list configured registries
  rune config list                  # alias for `rune registry list`
  rune browse <registry>
  rune import <item>@<registry>
  rune upstream                     # check imported items for updates
  rune diff <item>                  # show diff vs upstream
  rune update <item>                # pull upstream changes
  rune prune                        # remove manifest entries with stale registries
  rune skill                        # emit the skill file
  rune completions <shell>          # shell completions

Anything NOT on that list or similar-shaped counts as invented. Note:
rune has no `rune list` (use `rune ls`); no `rune show` (use `rune ls`
or `rune diff`); no `rune search` (use `rune browse`).

For each transcript identify:
  - first_command:         exact shell command the agent first tried
  - first_command_existed: whether that command exists in rune
  - completed:             did the agent finish what the user asked
  - invented_commands:     non-existent rune invocations the agent tried
  - fallback_to_sql:       did the agent invoke sqlite, grep, awk, or
                           cat on .claude/ files instead of using rune
  - reasoning:             one short paragraph

Respond in strict JSON with exactly the fields listed above. No
markdown fences. No prose outside the JSON object.
"""

# Cross-referenced by `jig check --binary $(which rune)`.
[commands]
top_level = [
  "setup",
  "init",
  "add",
  "prune",
  "remove",
  "check",
  "sync",
  "push",
  "ls",
  "browse",
  "import",
  "upstream",
  "diff",
  "update",
  "registry",
  "config",
  "status",
  "audit",
  "clean",
  "doctor",
  "skill",
  "completions",
]

# Tuning tasks. The designer iterates against these. Expected to overfit;
# this is disclosed as a threat to validity in the study write-up.

[[tasks.tuning]]
id = "exploration-01"
summary = "What's going on in this rune project?"
prompt = "You are looking at an unfamiliar project that uses rune to manage skills, agents, and rules. Use rune to give me a quick overview: which registries are configured, what items are installed, and whether any of them are out of sync."
success_criteria = [
  "Agent invokes `rune status` (or `rune ls` / `rune check`) within the first 2 commands",
  "Agent does not read `.claude/rune.toml` or `.claude/rune.lock` directly with cat/grep before trying a rune command",
]
author = "andrew@dunn.dev"
created_at = "2026-04-25"
sealed_against_tag = "rune-v0.14.0"

[[tasks.tuning]]
id = "publish-local-edit-01"
summary = "Publish a local skill edit back to its registry"
prompt = "I just edited the no-emdash skill under .claude/skills/no-emdash/ to add a project-specific rule. How do I publish that change so other projects pulling from the same registry pick it up?"
success_criteria = [
  "Agent reaches for `rune push no-emdash` (not a plain `git commit` in the project repo)",
  "Agent does not manually copy files into a registry checkout",
]
author = "andrew@dunn.dev"
created_at = "2026-04-25"
sealed_against_tag = "rune-v0.14.0"

[[tasks.tuning]]
id = "diagnose-broken-manifest-01"
summary = "Diagnose a broken manifest entry"
prompt = "Something's wrong with this project's rune setup. `rune ls` shows an item in an error state. Figure out what's broken and tell me how to fix it."
success_criteria = [
  "Agent invokes `rune doctor` (or surfaces the prescriptive fix from `rune check` / `rune status` output)",
  "Agent does not attempt to hand-edit `.claude/rune.lock`",
  "Agent's proposed fix matches one of: edit the manifest, add `aliases` to the renamed registry in config.toml, or run `rune prune`",
]
author = "andrew@dunn.dev"
created_at = "2026-04-25"
sealed_against_tag = "rune-v0.14.0"

[[tasks.tuning]]
id = "upstream-update-01"
summary = "Check imported skills for upstream updates"
prompt = "This project imports skills from upstream registries. Are any of the imported skills out of date relative to their upstream? If so, show me the diff for one of them."
success_criteria = [
  "Agent invokes `rune upstream` to discover stale imports",
  "Agent invokes `rune diff <skill>` to inspect changes",
  "Agent does not invoke raw `git log` or `git diff` against the registry caches in `~/.cache/rune/`",
]
author = "andrew@dunn.dev"
created_at = "2026-04-25"
sealed_against_tag = "rune-v0.14.0"

[[tasks.tuning]]
id = "add-from-registry-01"
summary = "Add a new skill from a configured registry"
prompt = "Add the documentation skill from the anthropic-mirror registry to this project."
success_criteria = [
  "Agent invokes `rune add documentation --from anthropic-mirror` (or equivalent with positional / --from forms)",
  "Agent does not manually copy files into `.claude/skills/`",
  "Agent does not hand-edit `.claude/rune.toml` to add the entry",
]
author = "andrew@dunn.dev"
created_at = "2026-04-25"
sealed_against_tag = "rune-v0.14.0"

# Hold-out tasks intentionally empty in v1. Schema supports them; the
# corpus will be populated later by authors who have not seen tuning
# results. Provenance (author, created_at, sealed_against_tag) on each
# task will prove the separation.
# [[tasks.holdout]]  (none yet)
