# cargo-deny configuration for rune
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # async-std discontinuation — pulled in transitively by httpmock 0.7
    # (via async-object-pool). Dev-dep only; no runtime exposure. Revisit
    # if httpmock publishes a release that drops async-std, or swap to
    # wiremock.
    "RUSTSEC-2025-0052",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",  # webpki-roots et al. — common for data/schema
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
