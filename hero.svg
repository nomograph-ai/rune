<svg viewBox="0 0 1200 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2c2417"/>
    </marker>
    <marker id="arr-dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c4b99a"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="430" fill="#faf6ed" stroke="#2c2417" stroke-width="3"/>

  <rect x="0" y="0" width="1200" height="36" fill="#2c2417"/>
  <text x="16" y="24" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#faf6ed" font-weight="bold">rune -- skill registry manager</text>
  <text x="1184" y="24" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#c4b99a" text-anchor="end">syncs inscribed knowledge from git registries</text>

  <!-- Left: Registries -->
  <rect x="40" y="60" width="260" height="280" fill="none" stroke="#c4b99a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="170" y="82" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#6b5d4f" text-anchor="middle" font-weight="bold">REGISTRIES</text>

  <rect x="56" y="96" width="228" height="100" fill="none" stroke="#2c2417" stroke-width="1.5"/>
  <rect x="56" y="96" width="228" height="22" fill="#2c2417"/>
  <text x="170" y="112" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#faf6ed" text-anchor="middle">public (any git repo)</text>
  <text x="72" y="134" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">tidy.md</text>
  <text x="72" y="150" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">iconography.md</text>
  <text x="72" y="166" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">research/SKILL.md</text>
  <text x="180" y="134" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">gitlab/SKILL.md</text>
  <text x="180" y="150" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">mirror.md</text>
  <text x="180" y="166" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">release.md</text>

  <rect x="56" y="210" width="228" height="80" fill="none" stroke="#2c2417" stroke-width="1.5"/>
  <rect x="56" y="210" width="228" height="22" fill="#2c2417"/>
  <text x="170" y="226" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#faf6ed" text-anchor="middle">private (authenticated)</text>
  <text x="72" y="248" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">voice.md</text>
  <text x="72" y="264" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">cadence.md</text>
  <text x="72" y="280" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">glean.md</text>
  <text x="180" y="248" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">gws.md</text>
  <text x="180" y="264" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">dkg.md</text>
  <text x="180" y="280" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">gcloud.md</text>

  <text x="170" y="316" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f" text-anchor="middle">any git host, any visibility</text>

  <!-- Arrows: registries -> rune -->
  <line x1="300" y1="150" x2="390" y2="185" stroke="#2c2417" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="300" y1="250" x2="390" y2="215" stroke="#2c2417" stroke-width="1.5" marker-end="url(#arr)"/>

