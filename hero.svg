  <line x1="600" y1="180" x2="690" y2="140" stroke="#2c2417" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="600" y1="200" x2="690" y2="215" stroke="#2c2417" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="600" y1="240" x2="690" y2="290" stroke="#2c2417" stroke-width="1.5" marker-end="url(#arr)"/>

