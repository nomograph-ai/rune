  <text x="500" y="118" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#faf6ed" text-anchor="middle" font-weight="bold">rune</text>

  <text x="416" y="148" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2c2417" font-weight="bold">sync</text>
  <text x="416" y="164" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  pull updates from registries</text>

  <text x="416" y="188" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2c2417" font-weight="bold">check</text>
  <text x="416" y="204" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  hash-based drift detection</text>

  <text x="416" y="228" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2c2417" font-weight="bold">push</text>
  <text x="416" y="244" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  send local edits upstream</text>

  <text x="416" y="268" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2c2417" font-weight="bold">add / ls</text>
  <text x="416" y="284" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">  manage skills per project</text>

  <text x="500" y="320" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f" text-anchor="middle">priority resolution</text>
  <text x="500" y="334" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f" text-anchor="middle">directory skill support</text>

