  <rect x="716" y="96" width="200" height="22" fill="#2c2417"/>
  <text x="816" y="112" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#faf6ed" text-anchor="middle">project-A</text>
  <text x="732" y="132" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">tidy.md, voice.md</text>
  <text x="732" y="148" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">research/SKILL.md</text>
  <text x="732" y="164" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#c4b99a">rune.toml</text>

  <rect x="716" y="182" width="200" height="72" fill="none" stroke="#2c2417" stroke-width="1.5"/>
  <rect x="716" y="182" width="200" height="22" fill="#2c2417"/>
  <text x="816" y="198" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#faf6ed" text-anchor="middle">project-B</text>
  <text x="732" y="218" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">tidy.md, gitlab/SKILL.md</text>
  <text x="732" y="234" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">mirror.md</text>
  <text x="732" y="250" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#c4b99a">rune.toml</text>

  <rect x="716" y="268" width="200" height="52" fill="none" stroke="#2c2417" stroke-width="1.5"/>
  <rect x="716" y="268" width="200" height="22" fill="#2c2417"/>
  <text x="816" y="284" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#faf6ed" text-anchor="middle">project-C</text>
  <text x="732" y="304" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">tidy.md, cadence.md</text>
  <text x="732" y="316" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#c4b99a">rune.toml</text>

  <!-- Key points right side -->
  <text x="940" y="120" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">agentskills.io</text>
  <text x="940" y="136" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f">compatible</text>

  <text x="940" y="196" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">any agent</text>
  <text x="940" y="212" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f">Claude, Cursor,</text>
  <text x="940" y="226" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f">Copilot, Gemini</text>

  <text x="940" y="276" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">drift detection</text>
  <text x="940" y="292" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f">hash-based</text>

  <!-- Footer -->
  <line x1="40" y1="360" x2="1160" y2="360" stroke="#c4b99a" stroke-width="1"/>
  <text x="600" y="380" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#6b5d4f" text-anchor="middle">registries are git repos -- skills are markdown -- rune keeps them current</text>
  <text x="590" y="408" text-anchor="middle" fill="#2c2417" font-family="'IBM Plex Mono', monospace" font-size="9" font-weight="600">Built with GitLab</text>
