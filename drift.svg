<svg viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#2c2417"/>
    </marker>
    <marker id="arrd" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#c4b99a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="520" fill="#faf6ed" stroke="#2c2417" stroke-width="3"/>
  <rect x="0" y="0" width="1200" height="36" fill="#2c2417"/>
  <text x="16" y="24" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#faf6ed" font-weight="bold">rune -- drift detection</text>
  <text x="1184" y="24" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#c4b99a" text-anchor="end">hash-based, lockfile-anchored</text>

  <!-- ═══════════════════════════════════════════════════════
       THREE COLUMNS, aligned top-to-bottom
       Column centers: x=213  x=599  x=985
       ═══════════════════════════════════════════════════════ -->

  <!-- ── COMPARISON ROW (y=48–106) ── -->
  <!-- Col 1: local file box, center x=213 -->
  <rect x="113" y="48" width="200" height="44" fill="none" stroke="#2c2417" stroke-width="1.5"/>
  <text x="213" y="66" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" text-anchor="middle" font-weight="bold">.claude/skills/tidy.md</text>
  <text x="213" y="82" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f" text-anchor="middle">local file  ·  current hash</text>

  <!-- horizontal arrow col1 → col2, label "vs" above -->
  <line x1="313" y1="70" x2="464" y2="70" stroke="#2c2417" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="388" y="64" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f" text-anchor="middle">vs</text>

  <!-- Col 2: lock box, center x=599 -->
  <rect x="469" y="48" width="260" height="44" fill="none" stroke="#2c2417" stroke-width="2"/>
  <rect x="469" y="48" width="260" height="18" fill="#2c2417"/>
  <text x="599" y="61" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#faf6ed" text-anchor="middle" font-weight="bold">.claude/rune.lock</text>
  <text x="599" y="82" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f" text-anchor="middle">tidy.hash  ·  tidy.registry_commit</text>

  <!-- horizontal arrow col2 → col3, label "vs" above -->
  <line x1="729" y1="70" x2="870" y2="70" stroke="#2c2417" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="800" y="64" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f" text-anchor="middle">vs</text>

  <!-- Col 3: registry box, center x=985 -->
  <rect x="875" y="48" width="220" height="44" fill="none" stroke="#2c2417" stroke-width="1.5"/>
  <text x="985" y="66" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" text-anchor="middle" font-weight="bold">registry HEAD</text>
  <text x="985" y="82" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#6b5d4f" text-anchor="middle">latest commit in git registry</text>

  <!-- ── DOWN ARROWS (y=92–148) with labels to the right ── -->
  <!-- Each arrow drops from its comparison box (y=92) to state box top (y=150) -->
  <line x1="213" y1="92" x2="213" y2="148" stroke="#c4b99a" stroke-width="1.5" marker-end="url(#arrd)"/>
  <text x="228" y="124" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#c4b99a">local ≠ lock</text>

  <line x1="599" y1="92" x2="599" y2="148" stroke="#c4b99a" stroke-width="1.5" marker-end="url(#arrd)"/>
  <text x="614" y="124" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#c4b99a">all match</text>

  <line x1="985" y1="92" x2="985" y2="148" stroke="#c4b99a" stroke-width="1.5" marker-end="url(#arrd)"/>
  <text x="1000" y="124" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#c4b99a">lock ≠ registry</text>

  <!-- ═══════════════════════════════════════════════════════
       STATE BOXES (y=150–430)
       Box 1: x=30  w=366  center=213
       Box 2: x=416 w=366  center=599
       Box 3: x=802 w=366  center=985
       ═══════════════════════════════════════════════════════ -->

  <!-- ── BOX 1: local modified ── -->
  <rect x="30" y="150" width="366" height="280" fill="none" stroke="#2c2417" stroke-width="2"/>
  <rect x="30" y="150" width="366" height="24" fill="#2c2417"/>
  <text x="213" y="166" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#faf6ed" text-anchor="middle" font-weight="bold">local modified</text>

  <text x="50" y="194" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">what happened:</text>
  <text x="50" y="210" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">you edited a skill file directly</text>
  <text x="50" y="226" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">local hash ≠ lock hash</text>
  <text x="50" y="242" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">lock commit = registry commit</text>
  <line x1="50" y1="254" x2="376" y2="254" stroke="#c4b99a" stroke-width="0.8"/>
  <text x="50" y="272" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">rune check  →  local newer</text>
  <line x1="50" y1="284" x2="376" y2="284" stroke="#c4b99a" stroke-width="0.8"/>
  <text x="50" y="302" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">to contribute your edit:</text>
  <text x="50" y="318" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">rune push tidy</text>
  <text x="50" y="338" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">to discard your edit:</text>
  <text x="50" y="354" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">rune sync --force</text>
  <line x1="50" y1="366" x2="376" y2="366" stroke="#c4b99a" stroke-width="0.8"/>
  <text x="50" y="382" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#c4b99a">hook fires on every edit to .claude/skills/</text>
  <text x="50" y="396" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#c4b99a">rune diff tidy  --  inspect the delta first</text>

  <!-- ── BOX 2: current ── -->
  <rect x="416" y="150" width="366" height="280" fill="none" stroke="#2c2417" stroke-width="2"/>
  <rect x="416" y="150" width="366" height="24" fill="#2c2417"/>
  <text x="599" y="166" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#faf6ed" text-anchor="middle" font-weight="bold">current</text>

  <text x="436" y="194" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">what happened:</text>
  <text x="436" y="210" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">skill is in sync with registry</text>
  <text x="436" y="226" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">local hash = lock hash</text>
  <text x="436" y="242" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">lock commit = registry commit</text>
  <line x1="436" y1="254" x2="762" y2="254" stroke="#c4b99a" stroke-width="0.8"/>
  <text x="436" y="272" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">rune check  →  current</text>
  <line x1="436" y1="284" x2="762" y2="284" stroke="#c4b99a" stroke-width="0.8"/>
  <text x="436" y="302" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">no action needed</text>
  <text x="436" y="318" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">rune sync is a no-op</text>
  <line x1="436" y1="366" x2="762" y2="366" stroke="#c4b99a" stroke-width="0.8"/>
  <text x="436" y="382" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#c4b99a">rune status  --  show all skills and state</text>
  <text x="436" y="396" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#c4b99a">rune ls      --  list skills + sync timestamps</text>

  <!-- ── BOX 3: registry updated ── -->
  <rect x="802" y="150" width="366" height="280" fill="none" stroke="#2c2417" stroke-width="2"/>
  <rect x="802" y="150" width="366" height="24" fill="#2c2417"/>
  <text x="985" y="166" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#faf6ed" text-anchor="middle" font-weight="bold">registry updated</text>

  <text x="822" y="194" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">what happened:</text>
  <text x="822" y="210" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">upstream registry was updated</text>
  <text x="822" y="226" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">local hash = lock hash</text>
  <text x="822" y="242" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">lock commit ≠ registry commit</text>
  <line x1="822" y1="254" x2="1148" y2="254" stroke="#c4b99a" stroke-width="0.8"/>
  <text x="822" y="272" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">rune check  →  registry newer</text>
  <line x1="822" y1="284" x2="1148" y2="284" stroke="#c4b99a" stroke-width="0.8"/>
  <text x="822" y="302" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">to pull the update:</text>
  <text x="822" y="318" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">rune sync</text>
  <text x="822" y="338" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2c2417" font-weight="bold">to inspect first:</text>
  <text x="822" y="354" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6b5d4f">rune diff tidy</text>
  <line x1="822" y1="366" x2="1148" y2="366" stroke="#c4b99a" stroke-width="0.8"/>
  <text x="822" y="382" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#c4b99a">rune upstream  --  check all imported skills</text>
  <text x="822" y="396" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#c4b99a">rune update tidy  --  pull and merge</text>

  <!-- Footer -->
  <line x1="40" y1="448" x2="1160" y2="448" stroke="#c4b99a" stroke-width="1"/>
  <text x="600" y="468" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#6b5d4f" text-anchor="middle">the lockfile is the anchor -- drift is always measured against what was installed, not inferred from timestamps</text>
  <text x="590" y="490" text-anchor="middle" fill="#2c2417" font-family="'IBM Plex Mono', monospace" font-size="9" font-weight="600">Built with GitLab</text>
  <g transform="translate(634, 479) scale(0.045)">
    <path d="M282.83,170.73l-.27-.69-26.14-68.22a6.81,6.81,0,0,0-2.69-3.24,7,7,0,0,0-8,.43,7,7,0,0,0-2.32,3.52l-17.65,54H154.29l-17.65-54A6.86,6.86,0,0,0,134.32,99a7,7,0,0,0-8-.43,6.87,6.87,0,0,0-2.69,3.24L97.44,170l-.26.69a48.54,48.54,0,0,0,16.1,56.1l.09.07.24.17,39.82,29.82,19.7,14.91,12,9.06a8.07,8.07,0,0,0,9.76,0l12-9.06,19.7-14.91,40.06-30,.1-.08A48.56,48.56,0,0,0,282.83,170.73Z" fill="#E24329"/>
    <path d="M282.83,170.73l-.27-.69a88.3,88.3,0,0,0-35.15,15.8L190,229.25c19.55,14.79,36.57,27.64,36.57,27.64l40.06-30,.1-.08A48.56,48.56,0,0,0,282.83,170.73Z" fill="#FC6D26"/>
    <path d="M153.43,256.89l19.7,14.91,12,9.06a8.07,8.07,0,0,0,9.76,0l12-9.06,19.7-14.91S209.55,244,190,229.25C170.45,244,153.43,256.89,153.43,256.89Z" fill="#FCA326"/>
    <path d="M132.58,185.84A88.19,88.19,0,0,0,97.44,170l-.26.69a48.54,48.54,0,0,0,16.1,56.1l.09.07.24.17,39.82,29.82s17-12.85,36.57-27.64Z" fill="#FC6D26"/>
  </g>
</svg>
